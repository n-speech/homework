<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — ВетКлиника</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:        #1D9E75;
  --green-dark:   #0F6E56;
  --green-light:  #E1F5EE;
  --text:         #1a1a1a;
  --text-muted:   #6b7280;
  --bg:           #f5f5f4;
  --bg-card:      #ffffff;
  --border:       rgba(0,0,0,0.1);
  --border-hover: rgba(0,0,0,0.2);
  --radius-md:    8px;
  --radius-lg:    12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
}

.form-field { margin-bottom: 14px; }
.form-label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
.form-input {
  width: 100%;
  padding: 8px 12px;
  border: 0.5px solid var(--border-hover);
  border-radius: var(--radius-md);
  font-size: 15px;
  background: white;
  color: var(--text);
  outline: none;
}
.form-input:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(29,158,117,.15); }

.login-page {
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  background: var(--bg);
  padding: 24px 16px;
}
.login-box {
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  width: 100%;
  max-width: 380px;
}
.login-logo { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
.login-logo span { color: var(--green); }
.login-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 28px; }

.login-tabs { display: flex; margin-bottom: 20px; border-bottom: 0.5px solid var(--border); }
.login-tab {
  flex: 1; text-align: center; padding: 10px;
  font-size: 15px; background: none; border: none;
  cursor: pointer; color: var(--text-muted);
  border-bottom: 2px solid transparent;
}
.login-tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }

.btn-login {
  width: 100%; padding: 11px;
  background: var(--green); color: white;
  border: none; border-radius: var(--radius-md);
  font-size: 16px; font-weight: 500; cursor: pointer;
  margin-top: 4px;
}
.btn-login:hover { background: var(--green-dark); }
.btn-login:disabled { opacity: .6; cursor: not-allowed; }

.login-error {
  background: #fcebeb; color: #a32d2d;
  border: 0.5px solid #f09595;
  border-radius: var(--radius-md);
  padding: 10px 14px; font-size: 15px;
  margin-bottom: 14px; display: none;
}
.login-success {
  background: var(--green-light); color: var(--green-dark);
  border: 0.5px solid #9FE1CB;
  border-radius: var(--radius-md);
  padding: 10px 14px; font-size: 15px;
  margin-bottom: 14px; display: none;
}

@media (max-width: 768px) {
  .login-box { padding: 24px 16px; }
  .login-logo { font-size: 20px; }
}
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo"><span>🐾</span> ВетКлиника</div>
    <div class="login-sub">Личный кабинет владельца питомца</div>
    <div class="login-tabs">
      <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Войти</button>
      <button class="login-tab" id="tab-register" onclick="switchTab('register')">Регистрация</button>
    </div>
    <div id="login-error" class="login-error"></div>
    <div id="login-success" class="login-success"></div>
    <div class="login-form">
      <div class="form-field">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email" placeholder="ваш@email.com">
      </div>
      <div class="form-field">
        <label class="form-label">Пароль</label>
        <input class="form-input" type="password" id="password" placeholder="Минимум 6 символов">
      </div>
      <button class="btn-login" id="btn-submit">Войти</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script>
  let mode = 'login';

  function switchTab(tab) {
    mode = tab;
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('btn-submit').textContent = tab === 'login' ? 'Войти' : 'Зарегистрироваться';
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('login-success').style.display = 'none';
  }

  document.getElementById('btn-submit').addEventListener('click', async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) {
      document.getElementById('login-error').textContent = 'Заполните все поля';
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Подождите...';
    document.getElementById('login-error').style.display = 'none';
    try {
      if (mode === 'login') {
        await Auth.login(email, password);
        window.location.href = 'dashboard.html';
      } else {
        await Auth.register(email, password);
        document.getElementById('login-success').textContent = 'Аккаунт создан! Проверьте email и войдите.';
        document.getElementById('login-success').style.display = 'block';
        switchTab('login');
      }
    } catch (err) {
      const msg = err.message.includes('Invalid login') ? 'Неверный email или пароль'
        : err.message.includes('already registered') ? 'Этот email уже зарегистрирован'
        : err.message;
      document.getElementById('login-error').textContent = msg;
      document.getElementById('login-error').style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = mode === 'login' ? 'Войти' : 'Зарегистрироваться';
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-submit').click();
  });

  Auth.init().then(user => {
    if (user) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
